<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Thao 🌷</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #1a4d0a;
    --green-mid: #2e7d1a;
    --green-bright: #4caf28;
    --green-light: #a8e063;
    --green-pale: #d6f5b0;
    --cream: #fefdf5;
    --gold: #d4a017;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #0d2e04 0%, #1a5208 40%, #0f3a06 100%);
    min-height: 100vh;
    font-family: 'Quicksand', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle, #a8e063, #4caf28);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease;
    mix-blend-mode: screen;
  }

  /* Particle canvas */
  #particles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }

  /* Main wrapper */
  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 80px;
  }

  /* Header sparkle title */
  .header {
    text-align: center;
    padding: 60px 20px 20px;
    animation: fadeDown 1.2s ease both;
  }
  .header .for-you {
    font-family: 'Quicksand', sans-serif;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--green-light);
    opacity: 0.8;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 10vw, 96px);
    font-weight: 600;
    color: var(--cream);
    line-height: 1;
    text-shadow: 0 0 40px rgba(168,224,99,0.4), 0 0 80px rgba(76,175,40,0.2);
    letter-spacing: -2px;
  }
  .header h1 span { color: var(--green-light); }

  /* Garden canvas */
  #garden {
    width: 100%;
    max-width: 900px;
    height: 420px;
    position: relative;
    margin: 20px 0 30px;
  }

  /* SVG tulip base styles */
  .tulip-group {
    position: absolute;
    bottom: 0;
    transform-origin: bottom center;
    animation: sway var(--sway-dur, 4s) ease-in-out infinite var(--sway-delay, 0s);
    cursor: pointer;
    transition: filter 0.3s;
  }
  .tulip-group:hover { filter: brightness(1.3) drop-shadow(0 0 12px rgba(168,224,99,0.8)); }
  .tulip-group svg { display: block; }

  @keyframes sway {
    0%, 100% { transform: rotate(var(--lean, 0deg)); }
    50%       { transform: rotate(calc(var(--lean, 0deg) + var(--swing, 2deg))); }
  }

  /* Ground strip */
  .ground {
    width: 100%;
    max-width: 900px;
    height: 60px;
    background: linear-gradient(to bottom, #2a6e0c, #1a4a08);
    border-radius: 50% 50% 0 0 / 20px 20px 0 0;
    position: relative;
    margin-top: -30px;
    box-shadow: 0 -6px 30px rgba(76,175,40,0.3);
  }
  .ground::before {
    content: '';
    position: absolute;
    top: -12px; left: 0; right: 0;
    height: 24px;
    background: radial-gradient(ellipse at 50% 100%, #3a9010 0%, transparent 70%);
  }

  /* Message card */
  .message-wrap {
    width: 100%;
    max-width: 700px;
    animation: fadeUp 1.4s 0.6s ease both;
  }

  .message-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(168,224,99,0.08) 100%);
    border: 1px solid rgba(168,224,99,0.25);
    border-radius: 28px;
    padding: 50px 56px;
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
  }
  .message-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168,224,99,0.12), transparent 70%);
  }
  .message-card::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(76,175,40,0.1), transparent 70%);
  }

  .quote-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    color: var(--green-light);
    opacity: 0.35;
    line-height: 0.6;
    display: block;
    margin-bottom: 16px;
  }
  .message-card p {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 400;
    font-style: italic;
    color: var(--cream);
    line-height: 1.75;
    position: relative;
    z-index: 1;
  }
  .message-card p em {
    color: var(--green-light);
    font-style: normal;
    font-weight: 600;
  }
  .message-card .signature {
    margin-top: 28px;
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green-light);
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .message-card .signature::before,
  .message-card .signature::after {
    content: '';
    height: 1px;
    flex: 1;
    background: linear-gradient(to right, transparent, rgba(168,224,99,0.4));
  }
  .message-card .signature::after { background: linear-gradient(to left, transparent, rgba(168,224,99,0.4)); }

  /* Color legend dots */
  .tulip-legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    margin-top: 40px;
    animation: fadeUp 1.6s 1s ease both;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Floating hearts */
  .hearts-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; overflow: hidden; }
  .heart { position: absolute; bottom: -40px; animation: floatUp linear infinite; opacity: 0; }
  .heart svg { width: 20px; height: 20px; }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-100vh) scale(1) rotate(20deg); opacity: 0; }
  }

  /* Animations */
  @keyframes fadeDown { from { opacity:0; transform: translateY(-30px); } to { opacity:1; transform: translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform: translateY(30px);  } to { opacity:1; transform: translateY(0); } }

  /* Sparkle */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparkleAnim 0.7s forwards;
    z-index: 50;
  }
  @keyframes sparkleAnim {
    0%   { transform: scale(0) rotate(0deg);   opacity: 1; }
    50%  { transform: scale(1.4) rotate(90deg); opacity: 1; }
    100% { transform: scale(0) rotate(180deg); opacity: 0; }
  }

  /* Tulip click pop */
  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .tulip-group.popped { animation: pop 0.4s ease both !important; }

  /* Responsive */
  @media (max-width: 600px) {
    .message-card { padding: 32px 28px; }
    #garden { height: 280px; }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="particles"></canvas>
<div class="hearts-container" id="hearts"></div>

<div class="page">

  <header class="header">
    <p class="for-you">✦ a little garden, just for you ✦</p>
    <h1>For <span>Thao</span></h1>
  </header>

  <div id="garden"></div>
  <div class="ground"></div>

  <div class="message-wrap">
    <div class="message-card">
      <span class="quote-mark">"</span>
      <p>
        Don't be too hard on yourself —<br>
        <em>making mistakes is what makes you human.</em><br>
        Every flower bends in the storm and still<br>
        finds its way back to the sun.<br><br>
        You are wonderful exactly as you are, Thao.<br>
        <em>This little garden is here to make you smile.</em>
      </p>
      <div class="signature">with love</div>
    </div>
  </div>

  <div class="tulip-legend" id="legend"></div>

</div>

<script>
// ─── Tulip data ───────────────────────────────────────────────────────────────
const TULIPS = [
  { color:'#e84040', mid:'#ff7070', dark:'#b02020', name:'Scarlet',     x:4,   size:1.0,  lean:-3, swing:3, delay:0    },
  { color:'#e040a0', mid:'#ff80cc', dark:'#a02070', name:'Rose Pink',   x:11,  size:1.15, lean:2,  swing:2, delay:0.4  },
  { color:'#c4840a', mid:'#ffcc40', dark:'#906000', name:'Golden',      x:19,  size:0.9,  lean:-2, swing:4, delay:0.8  },
  { color:'#7c3fb0', mid:'#c090e8', dark:'#4c1c80', name:'Lavender',    x:27,  size:1.1,  lean:3,  swing:2, delay:0.2  },
  { color:'#d85a30', mid:'#ff9060', dark:'#903010', name:'Coral',       x:35,  size:1.05, lean:-1, swing:3, delay:1.0  },
  { color:'#2aaa00', mid:'#70ee30', dark:'#157000', name:'Emerald',     x:43,  size:1.2,  lean:2,  swing:2, delay:0.6  },
  { color:'#2050d0', mid:'#6090f8', dark:'#103090', name:'Sapphire',    x:51,  size:0.95, lean:-3, swing:3, delay:0.3  },
  { color:'#c0b888', mid:'#f8f0d0', dark:'#887840', name:'Ivory',       x:59,  size:1.0,  lean:1,  swing:2, delay:0.9  },
  { color:'#cc0060', mid:'#ff50a0', dark:'#880040', name:'Magenta',     x:67,  size:1.1,  lean:-2, swing:4, delay:0.5  },
  { color:'#00909a', mid:'#40d8e0', dark:'#006070', name:'Teal',        x:75,  size:0.9,  lean:3,  swing:2, delay:1.1  },
  { color:'#c04080', mid:'#f080b0', dark:'#802050', name:'Blush',       x:83,  size:1.05, lean:-1, swing:3, delay:0.7  },
  { color:'#d4a017', mid:'#f8d060', dark:'#907008', name:'Amber',       x:91,  size:1.15, lean:2,  swing:2, delay:0.1  },
];

// ─── Render garden ────────────────────────────────────────────────────────────
const garden = document.getElementById('garden');
const legend = document.getElementById('legend');

TULIPS.forEach((t, i) => {
  const stemH = 160 + Math.random() * 60;
  const bH    = 70  + Math.random() * 20;
  const bW    = 34  + Math.random() * 10;
  const totalH = stemH + bH + 10;
  const w = bW * 2 + 20;

  const wrap = document.createElement('div');
  wrap.className = 'tulip-group';
  wrap.style.cssText = `
    left: ${t.x}%;
    width: ${w}px;
    --sway-dur: ${3.5 + Math.random() * 2}s;
    --sway-delay: ${t.delay}s;
    --lean: ${t.lean}deg;
    --swing: ${t.swing}deg;
  `;

  const svg = `
  <svg width="${w}" height="${totalH}" viewBox="0 0 ${w} ${totalH}" xmlns="http://www.w3.org/2000/svg">
    <!-- Stem -->
    <path d="M${w/2} ${totalH} Q${w/2-8} ${totalH - stemH*0.5} ${w/2} ${bH+8}"
          stroke="#2d7808" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Leaf left -->
    <path d="M${w/2} ${totalH - stemH*0.38} Q${w/2 - 38} ${totalH - stemH*0.5} ${w/2 - 32} ${totalH - stemH*0.62}"
          stroke="#3a9010" stroke-width="3.5" fill="#3a9010" opacity="0.9"/>
    <!-- Leaf right -->
    <path d="M${w/2} ${totalH - stemH*0.62} Q${w/2 + 36} ${totalH - stemH*0.72} ${w/2 + 28} ${totalH - stemH*0.82}"
          stroke="#2e7a08" stroke-width="3.5" fill="#2e7a08" opacity="0.85"/>
    <!-- Petals back -->
    <ellipse cx="${w/2 - bW*0.48}" cy="${bH*0.55}" rx="${bW*0.52}" ry="${bH*0.58}" fill="${t.dark}" opacity="0.88"/>
    <ellipse cx="${w/2 + bW*0.48}" cy="${bH*0.55}" rx="${bW*0.52}" ry="${bH*0.58}" fill="${t.dark}" opacity="0.88"/>
    <!-- Petals mid -->
    <ellipse cx="${w/2}" cy="${bH*0.55}" rx="${bW*0.52}" ry="${bH*0.62}" fill="${t.color}"/>
    <ellipse cx="${w/2 - bW*0.3}" cy="${bH*0.52}" rx="${bW*0.48}" ry="${bH*0.60}" fill="${t.color}" opacity="0.95"/>
    <ellipse cx="${w/2 + bW*0.3}" cy="${bH*0.52}" rx="${bW*0.48}" ry="${bH*0.60}" fill="${t.color}" opacity="0.95"/>
    <!-- Center highlight -->
    <ellipse cx="${w/2}" cy="${bH*0.42}" rx="${bW*0.28}" ry="${bH*0.32}" fill="${t.mid}" opacity="0.75"/>
    <!-- Tip shine -->
    <ellipse cx="${w/2 - 5}" cy="${bH*0.18}" rx="5" ry="8" fill="white" opacity="0.18"/>
  </svg>`;

  wrap.innerHTML = svg;

  // Click sparkle + pop
  wrap.addEventListener('click', (e) => {
    wrap.classList.remove('popped');
    void wrap.offsetWidth;
    wrap.classList.add('popped');
    spawnSparkles(e.clientX, e.clientY, t.mid);
    launchHearts(t.color, 5);
    setTimeout(() => wrap.classList.remove('popped'), 500);
  });

  garden.appendChild(wrap);

  // Legend dot
  const li = document.createElement('div');
  li.className = 'legend-item';
  li.innerHTML = `<div class="legend-dot" style="background:${t.color}"></div>${t.name}`;
  legend.appendChild(li);
});

// ─── Sparkles on click ────────────────────────────────────────────────────────
function spawnSparkles(cx, cy, color) {
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    const angle = (i / 8) * 360;
    const dist  = 30 + Math.random() * 30;
    const x = cx + Math.cos(angle * Math.PI/180) * dist;
    const y = cy + Math.sin(angle * Math.PI/180) * dist;
    el.style.cssText = `left:${x}px; top:${y}px;`;
    el.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14">
      <path d="M7 0 L8 6 L14 7 L8 8 L7 14 L6 8 L0 7 L6 6 Z" fill="${color}"/>
    </svg>`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }
}

// ─── Floating hearts ─────────────────────────────────────────────────────────
const heartsContainer = document.getElementById('hearts');

function launchHearts(color, n = 1) {
  for (let i = 0; i < n; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    const x = 5 + Math.random() * 90;
    const dur = 4 + Math.random() * 5;
    const delay = Math.random() * 1.5;
    h.style.cssText = `left:${x}%; animation-duration:${dur}s; animation-delay:${delay}s;`;
    h.innerHTML = `<svg viewBox="0 0 20 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 17 C10 17 1 11 1 5.5 C1 3 3 1 5.5 1 C7.24 1 8.91 1.97 10 3.34 C11.09 1.97 12.76 1 14.5 1 C17 1 19 3 19 5.5 C19 11 10 17 10 17Z" fill="${color}" opacity="0.8"/>
    </svg>`;
    heartsContainer.appendChild(h);
    setTimeout(() => h.remove(), (dur + delay + 1) * 1000);
  }
}

// Auto-launch hearts periodically
setInterval(() => {
  const rnd = TULIPS[Math.floor(Math.random() * TULIPS.length)];
  launchHearts(rnd.color, 1);
}, 2200);

// ─── Particle canvas ─────────────────────────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 55; i++) {
  particles.push({
    x: Math.random() * 2000,
    y: Math.random() * 1200,
    r: 1 + Math.random() * 2.5,
    speed: 0.15 + Math.random() * 0.4,
    opacity: 0.1 + Math.random() * 0.5,
    color: ['#a8e063','#70cc30','#d6f5b0','#ffffff'][Math.floor(Math.random()*4)]
  });
}

function animParticles() {
  ctx.clearRect(0,0,W,H);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x % W, p.y % H, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.opacity;
    ctx.fill();
    p.y -= p.speed;
    p.x += Math.sin(p.y * 0.01) * 0.3;
    if (p.y < -10) p.y = H + 10;
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animParticles);
}
animParticles();

// ─── Custom cursor ────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ─── Initial heart burst ─────────────────────────────────────────────────────
setTimeout(() => {
  TULIPS.forEach((t, i) => {
    setTimeout(() => launchHearts(t.color, 2), i * 120);
  });
}, 800);
</script>
</body>
</html>
